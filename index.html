<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#78350F">
<meta name="description" content="Café Cortado — jeu de placement tactique pour mobile">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Café Cortado">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="icon" href="icon-192.png" sizes="192x192" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json" />
<title>Café Cortado</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --brown: #78350F;
  --brown-light: #92400E;
  --brown-dark: #1C0A00;
  --cream: #FEF3C7;
  --bg: #F5EDD8;
  --gold: #F59E0B;
  --green: #22C55E;
  --red: #991B1B;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0; padding: 0;
  height: 100%; width: 100%;
  background: var(--bg);
  font-family: Georgia, "Times New Roman", serif;
  overscroll-behavior: none;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  touch-action: manipulation;
}

#root {
  height: 100%;
  width: 100%;
  display: flex;
  flex-direction: column;
}

/* Scrollable screens */
.screen {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
}

/* Safe areas */
.safe-top { padding-top: max(16px, var(--safe-top)); }
.safe-bottom { padding-bottom: max(16px, var(--safe-bottom)); }

/* Bottom navigation bar */
.bottom-nav {
  flex-shrink: 0;
  background: var(--brown-dark);
  border-top: 1px solid rgba(255,255,255,.12);
  padding: 8px 0;
  padding-bottom: max(8px, var(--safe-bottom));
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 100;
}

.bottom-nav button {
  background: none;
  border: none;
  color: rgba(255,255,255,.45);
  font-family: Georgia, serif;
  font-size: 11px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 16px;
  border-radius: 10px;
  transition: all .15s;
  min-width: 64px;
}
.bottom-nav button.active { color: var(--gold); }
.bottom-nav button .nav-icon { font-size: 22px; line-height: 1; }

/* Game header (sticky) */
.game-header {
  flex-shrink: 0;
  padding: 12px 14px;
  padding-top: max(12px, var(--safe-top));
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 20;
}

/* Animations */
@keyframes popIn { from { opacity:0; transform:scale(.93) translateY(8px); } to { opacity:1; transform:scale(1) translateY(0); } }
@keyframes scorePulse { 0% { transform:scale(.9); opacity:.2; } 50% { transform:scale(1.1); opacity:1; } 100% { transform:scale(1); opacity:1; } }
@keyframes tileDrop { from { opacity:.2; transform:translateY(-8px) scale(.96); } to { opacity:1; transform:translateY(0) scale(1); } }
@keyframes slideUp { from { opacity:0; transform:translateY(100%); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes ben67Pop {
  0% { opacity:0; transform:scale(.55) rotate(-8deg); }
  18% { opacity:1; transform:scale(1.18) rotate(3deg); }
  100% { opacity:1; transform:scale(1) rotate(0); }
}
@keyframes confettiFall {
  0% { opacity:0; transform:translateY(-18vh) rotate(0deg); }
  10% { opacity:1; }
  100% { opacity:0; transform:translateY(82vh) rotate(720deg); }
}

.pop-in { animation: popIn .22s ease-out both; }
.score-pulse { animation: scorePulse .4s ease-out both; }
.tile-drop { animation: tileDrop .18s ease-out both; }
.slide-up { animation: slideUp .28s ease-out both; }
.fade-in { animation: fadeIn .2s ease-out both; }
.spinner {
  width: 18px; height: 18px; border-radius: 50%;
  border: 3px solid rgba(120,53,15,.18);
  border-top-color: #78350F;
  animation: spin .8s linear infinite;
}
.ben67-overlay {
  position: fixed; inset: 0; z-index: 500;
  display: flex; align-items: center; justify-content: center;
  background: rgba(28,10,0,.82);
  pointer-events: none; overflow: hidden;
}
.ben67-number {
  color: #F59E0B;
  font-size: clamp(112px, 34vw, 260px);
  font-weight: 900;
  line-height: .8;
  text-shadow: 0 10px 0 #78350F, 0 0 38px rgba(245,158,11,.65);
  animation: ben67Pop .75s cubic-bezier(.2,1.35,.25,1) both;
}
.confetti-piece {
  position: absolute;
  top: 0;
  width: 10px; height: 18px; border-radius: 2px;
  animation: confettiFall 2.2s ease-in forwards;
}
.tutorial-callout {
  position: fixed;
  left: 14px; right: 14px; bottom: max(82px, calc(var(--safe-bottom) + 82px));
  z-index: 130;
  background: #1C0A00;
  color: #FEF3C7;
  border: 1px solid rgba(254,243,199,.22);
  border-radius: 12px;
  padding: 12px 14px;
  box-shadow: 0 12px 34px rgba(0,0,0,.35);
}
.tutorial-target {
  outline: 3px solid #F59E0B;
  outline-offset: 2px;
  box-shadow: 0 0 0 5px rgba(245,158,11,.22), 0 8px 24px rgba(0,0,0,.28) !important;
}

/* Modal bottom sheet */
.bottom-sheet-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(28,10,0,.72);
  display: flex; align-items: flex-end;
  animation: fadeIn .15s ease-out both;
}
.bottom-sheet {
  width: 100%; max-height: 88svh;
  background: var(--bg); border-radius: 16px 16px 0 0;
  overflow: hidden; display: flex; flex-direction: column;
  padding-bottom: max(0px, var(--safe-bottom));
  animation: slideUp .25s ease-out both;
}
.bottom-sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: rgba(120,53,15,.3); margin: 10px auto 4px;
  flex-shrink: 0;
}
.bottom-sheet-body { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 4px 14px 14px; }

/* Cells */
.cell {
  width: 100%; aspect-ratio: 1; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  position: relative; user-select: none; flex-shrink: 0;
  font-size: clamp(18px, 7.5vw, 30px);
  transition: transform .1s, box-shadow .1s;
}
.cell.valid:active { transform: scale(.93); }
.cell.rotatable:active { transform: scale(.93); }

/* VCard */
.vcard {
  flex: 1; border-radius: 12px; padding: 10px 6px;
  text-align: center; cursor: pointer;
  box-shadow: 0 4px 14px rgba(0,0,0,.3);
  transition: transform .12s;
  -webkit-tap-highlight-color: transparent;
}
.vcard:active { transform: scale(.93); }
.vcard.disabled { opacity: .45; pointer-events: none; }

/* Buttons base */
button { touch-action: manipulation; cursor: pointer; font-family: Georgia, serif; }

/* Action buttons */
.btn-primary {
  width: 100%; padding: 15px; border: none; border-radius: 12px;
  font-size: 16px; font-weight: bold; font-family: Georgia, serif;
  box-shadow: 0 4px 16px rgba(0,0,0,.3);
  transition: transform .1s, box-shadow .1s;
}
.btn-primary:active { transform: scale(.97); box-shadow: 0 2px 8px rgba(0,0,0,.25); }

.btn-secondary {
  padding: 10px 14px; border-radius: 10px;
  font-size: 13px; font-weight: bold; font-family: Georgia, serif;
  transition: transform .1s;
}
.btn-secondary:active { transform: scale(.95); }

/* Player strip */
.player-dot {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 6px 10px; border-radius: 10px;
  transition: all .2s;
}

/* Score badge */
.score-badge {
  background: rgba(255,255,255,.15);
  border-radius: 8px; padding: 2px 8px;
  color: white; font-size: 22px; font-weight: bold;
}

/* Vitrine row */
.vitrine-row { display: flex; gap: 8px; margin-bottom: 10px; }

/* Grid */
.cafe-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 4px; background: rgba(120,53,15,.12);
  padding: 6px; border-radius: 12px;
}

/* Info message */
.info-msg {
  margin: 8px 14px; padding: 10px 14px;
  border-radius: 10px; font-size: 13px; line-height: 1.4;
}

/* Setup screen */
.setup-screen {
  min-height: 100svh;
  background: linear-gradient(160deg, #1C0A00 0%, #78350F 55%, #1C0A00 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px 20px;
  text-align: center;
  color: var(--cream);
}

/* End screen */
.end-screen {
  background: linear-gradient(160deg, #1C0A00, #78350F 60%, #1C0A00);
  min-height: 100svh; height: 100svh; overflow-y: auto;
  padding: 20px 14px max(22px, var(--safe-bottom));
  color: var(--cream);
}

/* Transition screen */
.transition-screen {
  min-height: 100svh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px 20px; text-align: center;
}

/* Scrollable game body */
.game-body {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  padding-bottom: 16px;
}

/* Pill tag */
.pill {
  background: rgba(120,53,15,.08);
  border: 1px solid rgba(120,53,15,.14);
  border-radius: 8px; padding: 8px 10px;
  color: var(--brown);
}

/* Number picker */
.num-btn {
  width: 60px; height: 60px; border-radius: 14px; border: none;
  font-size: 24px; font-weight: bold; font-family: Georgia, serif;
  cursor: pointer; transition: all .15s;
}

/* Sticky end turn */
.end-turn-bar {
  flex-shrink: 0;
  padding: 10px 14px;
  padding-bottom: max(10px, var(--safe-bottom));
  background: var(--bg);
  border-top: 1px solid rgba(120,53,15,.12);
}

@media (min-width: 480px) {
  .cafe-grid { gap: 5px; padding: 8px; }
}

@media (min-width: 900px) {
  html, body {
    background:
      radial-gradient(circle at top, rgba(245,158,11,.16), transparent 34%),
      linear-gradient(135deg, #1C0A00 0%, #78350F 48%, #2B1003 100%);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  #root {
    width: min(430px, calc(100vw - 48px));
    height: min(860px, calc(100svh - 48px));
    max-height: 860px;
    border-radius: 26px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,.42), 0 0 0 1px rgba(255,255,255,.12);
    background: var(--bg);
  }

  .setup-screen,
  .transition-screen,
  .end-screen {
    min-height: 100%;
    height: 100%;
  }

  .bottom-sheet-overlay {
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .bottom-sheet {
    width: min(430px, calc(100vw - 48px));
    max-height: min(760px, calc(100svh - 48px));
    border-radius: 18px;
    padding-bottom: 0;
  }

  .slide-up { animation: popIn .2s ease-out both; }
}
</style>
</head>
<body>
<div id="root"></div>

function seedFromString(text){
  let h=2166136261;
  for(let i=0;i<text.length;i++){h^=text.charCodeAt(i);h=Math.imul(h,16777619);}
  return h>>>0;
}
function seededRandom(seed){
  let t=seed>>>0;
  return function(){
    t+=0x6D2B79F5;
    let r=Math.imul(t^t>>>15,1|t);
    r^=r+Math.imul(r^r>>>7,61|r);
    return ((r^r>>>14)>>>0)/4294967296;
  };
}
const rndWith = (a,rand=Math.random) => {
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=0|rand()*(i+1);[b[i],b[j]]=[b[j],b[i]];}
  return b;
};
const rnd = a => rndWith(a,Math.random);

function makeBag(rand=Math.random){

function getVP(grid){
  const res=[];
  for(let r=0;r<G;r++) for(let c=0;c<G;c++){
    if(grid[r][c]!==null) continue;
    if(D4.some(d=>{const[dr,dc]=DIRS[d],nr=r+dr,nc=c+dc;return nr>=0&&nr<G&&nc>=0&&nc<G&&grid[nr][nc]!==null;}))
      res.push([r,c]);
  }
  return res;
}

function getAllEmpty(grid){
  const res=[];
  for(let r=0;r<G;r++) for(let c=0;c<G;c++) if(grid[r][c]===null)res.push([r,c]);
  return res;
}

function countGroup(grid,type){
  const groups=[]; const vis=Array(G).fill(null).map(()=>Array(G).fill(false));
  for(let r=0;r<G;r++) for(let c=0;c<G;c++){
    if(grid[r][c]?.type===type&&!vis[r][c]){
      let sz=0; const stk=[[r,c]];
      while(stk.length){const[cr,cc]=stk.pop();if(vis[cr][cc])continue;vis[cr][cc]=true;sz++;
        D4.forEach(d=>{const[dr,dc]=DIRS[d],nr=cr+dr,nc=cc+dc;if(nr>=0&&nr<G&&nc>=0&&nc<G&&!vis[nr][nc]&&grid[nr][nc]?.type===type)stk.push([nr,nc]);});}
      groups.push(sz);
    }
  }
  return groups;
}

function adjacentTiles(grid,r,c){
  return D4.map(d=>{const[dr,dc]=DIRS[d],nr=r+dr,nc=c+dc;return nr>=0&&nr<G&&nc>=0&&nc<G?grid[nr][nc]:null;}).filter(Boolean);
}

function isCalmReader(grid,r,c){
  return D4.every(d=>{const[dr,dc]=DIRS[d],nr=r+dr,nc=c+dc;if(nr<0||nr>=G||nc<0||nc>=G)return true;const t=grid[nr][nc];return!t||(t.type!=='nomade'&&t.type!=='touriste');});
}

function freeWindowsFor(tile,grid,r,c){
  return(tile.windows||[]).reduce((s,d)=>{const[dr,dc]=DIRS[d],nr=r+dr,nc=c+dc;if(nr<0||nr>=G||nc<0||nc>=G)return s+1;return s+(grid[nr][nc]===null?1:0);},0);
}

function getStats(grid,tokens){
  const counts={habitue:0,nomade:0,touriste:0,lecteur:0,artiste:0};
  const nomadeGroups=countGroup(grid,'nomade');
  const habitueGroups=countGroup(grid,'habitue');
  let calmReaders=0,noisyReaders=0,freeWindows=0,edgeFreeWindows=0,edgeTourists=0,edgeCalmReaders=0;
  let habituesNearCounter=0,counterNeighbors=0,linkedHabitues=0,isolatedNomades=0,socialArtists=0,bestArtistKinds=0,artistPoints=0;
  let adjacentArtists=false,calmReaderNearArtist=false,touristNearCounter=false,artistNearTwoCalmReaders=false,touristNearThreeTypes=false,centerNomades=0,filled=countT(grid);
  for(let r=0;r<G;r++) for(let c=0;c<G;c++){
    const tile=grid[r][c]; if(!tile)continue;
    if(counts[tile.type]!==undefined)counts[tile.type]++;
    const adj=adjacentTiles(grid,r,c), edge=r===0||c===0||r===G-1||c===G-1;
    const nearCounter=adj.some(t=>t.type==='comptoir');
    if(tile.type==='touriste'){
      const fw=freeWindowsFor(tile,grid,r,c); freeWindows+=fw;
      if(edge){edgeTourists++; edgeFreeWindows+=fw;}
      if(nearCounter)touristNearCounter=true;
      if(new Set(adj.filter(t=>t.type!=='comptoir').map(t=>t.type)).size>=3)touristNearThreeTypes=true;
    }
    if(tile.type==='lecteur'){
      const calm=isCalmReader(grid,r,c);
      if(calm){calmReaders++; if(edge)edgeCalmReaders++; if(adj.some(t=>t.type==='artiste'))calmReaderNearArtist=true;}
      else noisyReaders++;
    }
    if(tile.type==='habitue'){
      if(nearCounter)habituesNearCounter++;
      if(adj.some(t=>t.type==='habitue'))linkedHabitues++;
    }
    if(tile.type==='nomade'){
      if(!adj.some(t=>t.type==='nomade'))isolatedNomades++;
      if(!edge)centerNomades++;
    }
    if(tile.type==='artiste'){
      const kinds=new Set(adj.filter(t=>t.type!=='comptoir').map(t=>t.type));
      bestArtistKinds=Math.max(bestArtistKinds,kinds.size);
      if(adj.length>=3)socialArtists++;
      if(adj.some(t=>t.type==='artiste'))adjacentArtists=true;
      if(D4.map(d=>{const[dr,dc]=DIRS[d],nr=r+dr,nc=c+dc;return nr>=0&&nr<G&&nc>=0&&nc<G&&grid[nr][nc]?.type==='lecteur'&&isCalmReader(grid,nr,nc);}).filter(Boolean).length>=2)artistNearTwoCalmReaders=true;
      artistPoints+=kinds.size===4?10:kinds.size*2;
    }
    if(tile.type!=='comptoir'&&nearCounter)counterNeighbors++;
  }
  const nomadeLine4=Array.from({length:G},(_,i)=>i).some(i=>
    Array.from({length:G},(_,c)=>grid[i][c]?.type==='nomade').every(Boolean)||
    Array.from({length:G},(_,r)=>grid[r][i]?.type==='nomade').every(Boolean)
  );
  let habitueSquare3=false;
  for(let r=0;r<G-1;r++) for(let c=0;c<G-1;c++){
    const n=[grid[r][c],grid[r+1][c],grid[r][c+1],grid[r+1][c+1]].filter(t=>t?.type==='habitue').length;
    if(n>=3)habitueSquare3=true;
  }
  const typeCounts=Object.values(counts);
  const balancedCafe=typeCounts.filter(x=>x>=3).length===3;
  const noDominantType=typeCounts.every(x=>x<=4);
  return{
    counts,tokens,filled,nomadeGroups,habitueGroups,calmReaders,noisyReaders,freeWindows,edgeFreeWindows,edgeTourists,edgeCalmReaders,
    habituesNearCounter,counterNeighbors,linkedHabitues,isolatedNomades,socialArtists,bestArtistKinds,artistPoints,
    adjacentArtists,calmReaderNearArtist,touristNearCounter,nomadeLine4,habitueSquare3,balancedCafe,artistNearTwoCalmReaders,touristNearThreeTypes,centerNomades,noDominantType,
    maxNomadeGroup:Math.max(0,...nomadeGroups),maxHabitueGroup:Math.max(0,...habitueGroups),
    typeKinds:Object.values(counts).filter(x=>x>0).length,
  };
}

}

function eScore(player,publicObjectives,ctx){
  const grid=player.grid,tokens=player.cortado,stats=getStats(grid,tokens);
  let sc=0; const lines=[]; const sections={tuiles:[],roles:[],publics:[],secret:[],cortados:[]};
  const maxG=stats.maxNomadeGroup;
  const np=maxG===0?0:maxG===1?1:maxG===2?3:maxG===3?6:10;
  sc+=np; if(maxG>0){const l=`💻 Nomades ×${maxG} → +${np}pts`;lines.push(l);sections.tuiles.push(l);}
  let lp=0,lc=0,ap=0,ac=0;
  for(let r=0;r<G;r++) for(let c=0;c<G;c++){
    if(grid[r][c]?.type==='lecteur'&&isCalmReader(grid,r,c)){lp+=4+(player.role?.id==='critique'?1:0);lc++;}
    if(grid[r][c]?.type==='artiste'){
      const kinds=new Set(adjacentTiles(grid,r,c).filter(t=>t.type!=='comptoir').map(t=>t.type));
      ap+=(kinds.size===4?10:kinds.size*2)+(player.role?.id==='conservateur'?kinds.size:0); ac++;
    }
  }
  sc+=lp; if(lc>0){const l=`📖 Lecteurs calmes ${lc}×${player.role?.id==='critique'?5:4} → +${lp}pts`;lines.push(l);sections.tuiles.push(l);}
  sc+=ap; if(ac>0){const l=`🎨 Artistes → +${ap}pts`;lines.push(l);sections.tuiles.push(l);}
  if(player.role?.id==='entrepreneur'&&maxG>0){sc+=2;const l='💻 Entrepreneur → +2pts';lines.push(l);sections.roles.push(l);}
  const bp=tokens*2; sc+=bp; if(bp>0){const l=`☕ Cortados restants ${tokens}×2 → +${bp}pts`;lines.push(l);sections.cortados.push(l);}
  publicObjectives.forEach(o=>{if(typeof o.score!=='function')return; const[pts,line]=o.score(stats,ctx); if(pts>0){sc+=pts;lines.push(line);sections.publics.push(line);}});
  if(typeof player.secret?.ok==='function'&&player.secret.ok(stats)){const l=`${player.secret.e} Secret "${player.secret.n}" → +${player.secret.pts}pts`;sc+=player.secret.pts;lines.push(l);sections.secret.push(l);}
  else {const l=`${player.secret?.e||'🎯'} Secret "${player.secret?.n||''}" manqué`;lines.push(l);sections.secret.push(l);}
  return{sc,lines,sections};
}

function normalizeChallengeDate(value){
  if(!value)return '';
  const text=String(value);
  const iso=text.match(/\d{4}-\d{2}-\d{2}/);
  if(iso)return iso[0];
  const fr=text.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(fr)return `${fr[3]}-${fr[2]}-${fr[1]}`;
  return text;
}

function trimBestScores(entries){
  const sorted=[...(entries||[])].sort((a,b)=>(b.score||0)-(a.score||0));
  const standard=sorted.filter(s=>(s.category||'standard')==='standard');
  const daily=sorted.filter(s=>s.category==='daily'&&normalizeChallengeDate(s.challengeDate)===dailyChallengeDate()).slice(0,SCOREBOARD_LIMIT_PER_MODE);
  const solo=standard.filter(s=>s.mode==='solo'||s.player==='Solo'||s.playerCount===1).slice(0,SCOREBOARD_LIMIT_PER_MODE);
  const multi=standard.filter(s=>s.mode==='multi'||Number(s.playerCount)>1).slice(0,SCOREBOARD_LIMIT_PER_MODE);
  const seen=new Set();
  return [...solo,...multi,...daily].filter(s=>{
    const key=s.id||`${s.gameId||''}-${s.player||''}-${s.score||0}-${s.date||''}`;
    if(seen.has(key))return false;
    seen.add(key);
    return true;
  }).sort((a,b)=>(b.score||0)-(a.score||0));
}
function scoresToHistory(scores){
  const groups=new Map();
  (scores||[]).forEach((score,i)=>{
    const gameId=score.gameId||score.id||`legacy-${score.date||'date'}-${score.player||'player'}-${i}`;
    if(!groups.has(gameId)){
      groups.set(gameId,{
        gameId,
        date:score.date||'',
        time:score.time||'',
        mode:score.mode||'legacy',
        playerCount:score.playerCount||(score.mode==='solo'?1:null),
        version:score.version||GAME_VERSION,
        publicObjectives:score.publicObjectives||[],
        scores:[],
      });
    }
    groups.get(gameId).scores.push(score);
  });
  return Array.from(groups.values())
    .map(game=>({...game,scores:[...game.scores].sort((a,b)=>(b.score||0)-(a.score||0))}))
    .sort((a,b)=>historyTime(b)-historyTime(a));
}
function historyTime(game){
  const idTime=Number(String(game?.gameId||'').split('-')[0]);
  if(Number.isFinite(idTime)&&idTime>0)return idTime;
  const text=[game?.date,game?.time].filter(Boolean).join(' ');
  const parsed=Date.parse(text);
  return Number.isFinite(parsed)?parsed:0;
}

function loadOnlineScores(mode,category='standard',date=null){
  if(!ONLINE_SCORE_ENDPOINT)return Promise.reject(new Error('missing-endpoint'));
  return new Promise((resolve,reject)=>{
    const cb=`cafeCortadoScores_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    const script=document.createElement('script');
    const sep=ONLINE_SCORE_ENDPOINT.includes('?')?'&':'?';
    const timeout=setTimeout(()=>{
      cleanup();
      reject(new Error('timeout'));
    },10000);
    function cleanup(){
      clearTimeout(timeout);
      delete window[cb];
      script.remove();
    }
    window[cb]=data=>{
      cleanup();
      if(data?.ok)resolve(data.scores||[]);
      else reject(new Error(data?.error||'online-load-error'));
    };
    script.onerror=()=>{
      cleanup();
      reject(new Error('script-error'));
    };
    const modeParam=mode?`&mode=${encodeURIComponent(mode)}`:'';
    const categoryParam=category?`&category=${encodeURIComponent(category)}`:'';
    const dateParam=date?`&challengeDate=${encodeURIComponent(date)}`:'';
    script.src=`${ONLINE_SCORE_ENDPOINT}${sep}callback=${encodeURIComponent(cb)}&jsonp=${encodeURIComponent(cb)}&cb=${encodeURIComponent(cb)}&limit=${ONLINE_SCORE_FETCH_LIMIT}${modeParam}${categoryParam}${dateParam}&_=${Date.now()}`;
    document.body.appendChild(script);
  });
}

function Cell({tile,valid,rotatable,preview,onClick,onInfo,highlight=false}){
  const cfg=tile?T[tile.type]:null;
  const pressTimer=useRef(null);
  const didLongPress=useRef(false);
  const startPress=()=>{
    didLongPress.current=false;
    if(!tile||!onInfo)return;
    clearTimeout(pressTimer.current);
    pressTimer.current=setTimeout(()=>{didLongPress.current=true;haptic('medium');onInfo(tile);},520);
  };
  const endPress=()=>{
    clearTimeout(pressTimer.current);
    setTimeout(()=>{didLongPress.current=false;},0);
  };
  return(
    <div onClick={e=>{if(didLongPress.current){e.preventDefault();return;}if(valid||rotatable){haptic('medium');onClick?.();}}}
      onPointerDown={startPress} onPointerUp={endPress} onPointerCancel={endPress} onPointerLeave={endPress}
      className={`cell${tile?' tile-drop':''}${valid?' valid':''}${rotatable?' rotatable':''}${highlight?' tutorial-target':''}`} style={{
      background:cfg?cfg.bg:preview?'rgba(245,158,11,0.24)':valid?'rgba(34,197,94,0.18)':'rgba(0,0,0,0.07)',
      border:rotatable?'2.5px solid #F59E0B':preview?'2.5px solid #F59E0B':valid?'2.5px dashed #22C55E':'2px solid transparent',
      cursor:valid||rotatable?'pointer':'default',
      boxShadow:tile?'0 2px 7px rgba(0,0,0,.25)':preview?'0 0 14px rgba(245,158,11,.4)':valid?'0 0 10px rgba(34,197,94,.3)':'none',
    }}>
      {cfg?cfg.e:valid?<span style={{color:'#16A34A',fontWeight:'bold',fontSize:'clamp(10px,3.5vw,18px)'}}>+</span>:null}
      {preview&&<span style={{position:'absolute',right:2,bottom:1,background:'#F59E0B',color:'#1C0A00',borderRadius:4,padding:'1px 3px',fontSize:9,fontWeight:'bold'}}>+{preview.pts}</span>}
      {tile?.type==='touriste'&&(tile.windows||[]).map(d=><WBar key={d} d={d}/>)}
    </div>
  );
}

// ─── VCard ────────────────────────────────────────────────────────────────────
function VCard({tile,onClick,disabled,onInfo,compact=false,highlight=false}){
  const cfg=T[tile.type];
  const pressTimer=useRef(null);
  const didLongPress=useRef(false);
  const startPress=()=>{
    didLongPress.current=false;
    clearTimeout(pressTimer.current);
    pressTimer.current=setTimeout(()=>{didLongPress.current=true;haptic('medium');onInfo?.(tile);},520);
  };
  const endPress=()=>{
    clearTimeout(pressTimer.current);
    setTimeout(()=>{didLongPress.current=false;},0);
  };
  return(
    <div onClick={e=>{if(didLongPress.current){e.preventDefault();return;}if(!disabled){haptic('light');onClick?.();}}}
      onPointerDown={startPress} onPointerUp={endPress} onPointerCancel={endPress} onPointerLeave={endPress}
      className={`vcard${disabled?' disabled':''}${highlight?' tutorial-target':''} pop-in`}
      style={{background:cfg.bg,color:cfg.fg,padding:compact?'7px 5px':'10px 6px'}}>

// ─── Confirm Quit Sheet ────────────────────────────────────────────────────────
function LeaderboardSheet({open,onClose,leaderboard,onClear}){
  const[scope,setScope]=useState('local');
  const[mode,setMode]=useState('solo');
  const[onlineScores,setOnlineScores]=useState([]);
  const[onlineStatus,setOnlineStatus]=useState({type:'idle',text:''});
  if(!open)return null;
  const refreshOnlineScores=()=>{
    if(!ONLINE_SCORE_ENDPOINT){setOnlineStatus({type:'error',text:'Classement général non configuré.'});return;}
    setOnlineStatus({type:'pending',text:'Chargement du classement général...'});
    loadOnlineScores()
      .then(scores=>{setOnlineScores(scores||[]);setOnlineStatus({type:'ok',text:scores?.length?'':'Aucun score général pour le moment.'});})
      .catch(()=>setOnlineStatus({type:'error',text:'Impossible de charger le classement général.'}));
  };
  const source=scope==='local'?leaderboard:onlineScores;
  const filtered=(source||[]).filter(s=>mode==='solo'?(s.mode==='solo'||s.playerCount===1||s.player==='Solo'):(s.mode==='multi'||Number(s.playerCount)>1)).sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,SCOREBOARD_LIMIT_PER_MODE);
  const showLoading=scope==='general'&&onlineStatus.type==='pending';
  const showEmpty=!showLoading&&filtered.length===0;
  return(
    <div className="bottom-sheet-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="bottom-sheet slide-up">
        <div className="bottom-sheet-handle"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 14px 10px',flexShrink:0}}>
          <strong style={{fontSize:16,color:'#78350F'}}>🏆 Classement</strong>
          <button onClick={onClose} className="btn-secondary" style={{background:'#78350F',color:'#FEF3C7',border:'none'}}>Fermer</button>
        </div>
        <div className="bottom-sheet-body">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:8}}>
            {[['local','Local'],['general','Général']].map(([id,label])=>(
              <button key={id} onClick={()=>{setScope(id);if(id==='general'&&!onlineScores.length)refreshOnlineScores();}} style={{border:'1px solid rgba(120,53,15,.16)',borderRadius:8,padding:'9px 6px',background:scope===id?'#78350F':'rgba(120,53,15,.07)',color:scope===id?'#FEF3C7':'#78350F',fontSize:12,fontWeight:'bold'}}>{label}</button>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:12}}>
            {[['solo','Solo'],['multi','Multijoueur']].map(([id,label])=>(
              <button key={id} onClick={()=>setMode(id)} style={{border:'1px solid rgba(120,53,15,.16)',borderRadius:8,padding:'8px 6px',background:mode===id?'rgba(245,158,11,.22)':'rgba(120,53,15,.06)',color:'#78350F',fontSize:12,fontWeight:'bold'}}>{label}</button>
            ))}
          </div>
          {scope==='general'&&(
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10,marginBottom:10}}>
              <div style={{fontSize:12,color:'#78350F',opacity:.78}}>Scores envoyés en ligne</div>
              <button onClick={refreshOnlineScores} disabled={showLoading} className="btn-secondary" style={{background:'rgba(20,83,45,.12)',color:'#14532D',border:'1px solid rgba(20,83,45,.2)',opacity:showLoading?0.7:1}}>Actualiser</button>
            </div>
          )}
          {showLoading&&<div className="pill" style={{display:'flex',alignItems:'center',gap:10,fontSize:12,marginBottom:8}}><span className="spinner"/> {onlineStatus.text}</div>}
          {onlineStatus.type==='error'&&scope==='general'&&<div className="pill" style={{fontSize:12,marginBottom:8,color:'#991B1B'}}>{onlineStatus.text}</div>}
          {showEmpty
            ?<div className="pill" style={{fontSize:12,opacity:.72,color:'#78350F'}}>Aucun score dans ce filtre.</div>
            :<div style={{display:'grid',gap:6}}>
              {filtered.map((s,i)=>{
                const rawDate=String(s.date||'');
                const cleanDate=rawDate.includes('T')?'':rawDate;
                const cleanMode=s.category==='daily'||s.mode==='daily'?'Défi quotidien':s.mode==='solo'||s.playerCount===1?'Solo':`${s.playerCount||'?'} joueurs`;
                return(
                  <div key={`${scope}-${s.id||s.gameId||s.date}-${s.player}-${i}`} style={{display:'grid',gridTemplateColumns:'28px 1fr auto',gap:8,alignItems:'center',background:i===0?'rgba(245,158,11,.18)':'rgba(120,53,15,.07)',border:'1px solid rgba(120,53,15,.12)',borderRadius:8,padding:'8px 10px'}}>
                    <strong style={{fontSize:13,color:'#78350F'}}>{i+1}</strong>
                    <div>
                      <div style={{fontSize:12,fontWeight:'bold',color:'#78350F'}}>{s.emoji||''} {s.player||'Joueur'}</div>
                      <div style={{fontSize:10,opacity:.62,color:'#78350F'}}>{cleanMode} · {s.role||'Rôle ?'}{cleanDate?` · ${cleanDate}`:''}</div>
                    </div>
                    <strong style={{fontSize:16,color:i===0?'#B45309':'#78350F'}}>{s.score}</strong>
                  </div>
                );
              })}
            </div>
          }

function LeaderboardSheetByMode({open,onClose,leaderboard,onClear}){
  const[scope,setScope]=useState('local');
  const[category,setCategory]=useState('standard');
  const[mode,setMode]=useState('solo');
  const[scoreDetail,setScoreDetail]=useState(null);
  const[onlineScores,setOnlineScores]=useState({solo:[],multi:[],daily:[]});
  const[onlineStatus,setOnlineStatus]=useState({solo:{type:'idle',text:''},multi:{type:'idle',text:''},daily:{type:'idle',text:''}});
  if(!open)return null;
  const dailyDone=hasCompletedDailyChallenge();
  const dailyDate=dailyChallengeDate();
  const activeKey=category==='daily'?'daily':mode;
  const currentOnlineStatus=onlineStatus[activeKey]||{type:'idle',text:''};
  const refreshOnlineScores=(nextKey=activeKey)=>{
    const nextCategory=nextKey==='daily'?'daily':'standard';
    const nextMode=nextKey==='daily'?'daily':nextKey;
    if(!ONLINE_SCORE_ENDPOINT){
      setOnlineStatus(s=>({...s,[nextKey]:{type:'error',text:'Classement général non configuré.'}}));
      return;
    }
    setOnlineStatus(s=>({...s,[nextKey]:{type:'pending',text:nextKey==='daily'?'Chargement du défi quotidien...':`Chargement du classement ${nextMode==='solo'?'solo':'multijoueur'}...`}}));
    const scoreRequest=nextCategory==='daily'
      ? loadOnlineScores(nextMode,nextCategory,dailyDate).then(scores=>scores?.length?scores:loadOnlineScores(nextMode,nextCategory,null))
      : loadOnlineScores(nextMode,nextCategory,null);
    scoreRequest
      .then(scores=>{
        setOnlineScores(s=>({...s,[nextKey]:scores||[]}));
        setOnlineStatus(s=>({...s,[nextKey]:{type:'ok',text:scores?.length?'':'Aucun score général pour le moment.'}}));
      })
      .catch(()=>setOnlineStatus(s=>({...s,[nextKey]:{type:'error',text:'Impossible de charger le classement général.'}})));
  };
  const source=scope==='local'?leaderboard:(onlineScores[activeKey]||[]);
  const filteredBase=(source||[])
    .filter(s=>category==='daily'?((s.category==='daily'||s.mode==='daily')&&(!s.challengeDate||normalizeChallengeDate(s.challengeDate)===dailyDate)):(s.category||'standard')==='standard'&&(mode==='solo'?(s.mode==='solo'||s.playerCount===1||s.player==='Solo'):(s.mode==='multi'||Number(s.playerCount)>1)))
    .sort((a,b)=>(b.score||0)-(a.score||0));
  const filtered=(category==='daily'
    ? filteredBase.filter((s,i,arr)=>{
        const key=`${String(s.player||'Joueur').trim().toLowerCase()}-${Number(s.score||0)}`;
        return arr.findIndex(other=>`${String(other.player||'Joueur').trim().toLowerCase()}-${Number(other.score||0)}`===key)===i;
      })
    : filteredBase
  ).slice(0,SCOREBOARD_LIMIT_PER_MODE);
  const showLoading=scope==='general'&&currentOnlineStatus.type==='pending';
  const showEmpty=!showLoading&&filtered.length===0;
  return(
    <>
    <div className="bottom-sheet-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="bottom-sheet slide-up">
        <div className="bottom-sheet-handle"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 14px 10px',flexShrink:0}}>
          <strong style={{fontSize:16,color:'#78350F'}}>🏆 Classement</strong>
          <button onClick={onClose} className="btn-secondary" style={{background:'#78350F',color:'#FEF3C7',border:'none'}}>Fermer</button>
        </div>
        <div className="bottom-sheet-body">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:8}}>
            {[['local','Local'],['general','Général']].map(([id,label])=>(
              <button key={id} onClick={()=>{setScope(id);if(id==='general'&&currentOnlineStatus.type==='idle')refreshOnlineScores(activeKey);}} style={{border:'1px solid rgba(120,53,15,.16)',borderRadius:8,padding:'9px 6px',background:scope===id?'#78350F':'rgba(120,53,15,.07)',color:scope===id?'#FEF3C7':'#78350F',fontSize:12,fontWeight:'bold'}}>{label}</button>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:dailyDone?'1fr 1fr 1fr':'1fr 1fr',gap:6,marginBottom:12}}>
            {[['solo','Solo'],['multi','Multijoueur'],...(dailyDone?[['daily','Défi quotidien']]:[])].map(([id,label])=>(
              <button key={id} onClick={()=>{const nextCategory=id==='daily'?'daily':'standard';setCategory(nextCategory);if(id!=='daily')setMode(id);if(scope==='general'&&(onlineStatus[id]?.type||'idle')==='idle')refreshOnlineScores(id);}} style={{border:'1px solid rgba(120,53,15,.16)',borderRadius:8,padding:'8px 6px',background:(id==='daily'?category==='daily':category==='standard'&&mode===id)?'rgba(245,158,11,.22)':'rgba(120,53,15,.06)',color:'#78350F',fontSize:12,fontWeight:'bold'}}>{label}</button>
            ))}
          </div>
          {scope==='general'&&(
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10,marginBottom:10}}>
              <div style={{fontSize:12,color:'#78350F',opacity:.78}}>Scores envoyés en ligne</div>
              <button onClick={()=>refreshOnlineScores(activeKey)} disabled={showLoading} className="btn-secondary" style={{background:'rgba(20,83,45,.12)',color:'#14532D',border:'1px solid rgba(20,83,45,.2)',opacity:showLoading?0.7:1}}>Actualiser</button>
            </div>
          )}
          {showLoading&&<div className="pill" style={{display:'flex',alignItems:'center',gap:10,fontSize:12,marginBottom:8}}><span className="spinner"/> {currentOnlineStatus.text}</div>}
          {currentOnlineStatus.type==='error'&&scope==='general'&&<div className="pill" style={{fontSize:12,marginBottom:8,color:'#991B1B'}}>{currentOnlineStatus.text}</div>}
          {showEmpty
            ?<div className="pill" style={{fontSize:12,opacity:.72,color:'#78350F'}}>Aucun score dans ce filtre.</div>
            :<div style={{display:'grid',gap:6}}>
              {filtered.map((s,i)=>{
                const rawDate=String(s.date||'');
                const cleanDate=rawDate.includes('T')?'':rawDate;
                const cleanMode=s.category==='daily'||s.mode==='daily'?'Défi quotidien':s.mode==='solo'||s.playerCount===1?'Solo':`${s.playerCount||'?'} joueurs`;
                return(
                  <div key={`${scope}-${s.id||s.gameId||s.date}-${s.player}-${i}`} style={{display:'grid',gridTemplateColumns:'28px 1fr auto auto',gap:8,alignItems:'center',background:i===0?'rgba(245,158,11,.18)':'rgba(120,53,15,.07)',border:'1px solid rgba(120,53,15,.12)',borderRadius:8,padding:'8px 10px'}}>
                    <strong style={{fontSize:13,color:'#78350F'}}>{i+1}</strong>
                    <div>
                      <div style={{fontSize:12,fontWeight:'bold',color:'#78350F'}}>{s.emoji||''} {s.player||'Joueur'}</div>
                      <div style={{fontSize:10,opacity:.62,color:'#78350F'}}>{cleanMode} · {s.role||'Rôle ?'}{cleanDate?` · ${cleanDate}`:''}</div>
                    </div>
                    <strong style={{fontSize:16,color:i===0?'#B45309':'#78350F'}}>{s.score}</strong>
                    <button onClick={()=>setScoreDetail(s)} className="btn-secondary" style={{fontSize:10,padding:'5px 7px',background:'rgba(120,53,15,.1)',color:'#78350F',border:'1px solid rgba(120,53,15,.18)'}}>Détails</button>
                  </div>
                );
              })}
            </div>
          }
          {scope==='local'&&leaderboard.length>0&&<button onClick={onClear} className="btn-secondary" style={{width:'100%',marginTop:12,background:'rgba(120,53,15,.1)',color:'#78350F',border:'1px solid rgba(120,53,15,.18)'}}>Effacer le classement local</button>}
        </div>
      </div>
    </div>
    {scoreDetail&&(
      <div className="bottom-sheet-overlay" onClick={e=>{if(e.target===e.currentTarget)setScoreDetail(null);}} style={{zIndex:260}}>
        <div className="bottom-sheet slide-up" onClick={e=>e.stopPropagation()}>
          <div className="bottom-sheet-handle"/>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 14px 10px',flexShrink:0}}>
            <strong style={{fontSize:16,color:'#78350F'}}>🏆 Détail du score</strong>
            <button onClick={()=>setScoreDetail(null)} className="btn-secondary" style={{background:'#78350F',color:'#FEF3C7',border:'none'}}>Fermer</button>
          </div>
          <div className="bottom-sheet-body">
            <div className="pill" style={{display:'grid',gridTemplateColumns:'1fr auto',gap:10,alignItems:'center',marginBottom:8}}>
              <div>
                <div style={{fontSize:14,fontWeight:'bold',color:'#78350F'}}>{scoreDetail.emoji||''} {scoreDetail.player||'Joueur'}</div>
                <div style={{fontSize:11,color:'#92400E',opacity:.75,marginTop:2}}>{scoreDetail.date}{scoreDetail.time?` · ${scoreDetail.time}`:''} · {scoreDetail.mode==='solo'||scoreDetail.playerCount===1?'Solo':`${scoreDetail.playerCount||'?'} joueurs`}</div>
              </div>
              <strong style={{fontSize:26,color:'#B45309'}}>{scoreDetail.score}<span style={{fontSize:11,marginLeft:2}}>pts</span></strong>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,margin:'8px 0'}}>
              <InfoPill item={{e:scoreDetail.roleEmoji||'🎭',n:scoreDetail.role||'Rôle',d:scoreDetail.roleDescription||'Rôle non enregistré.'}}/>
              <InfoPill item={{e:scoreDetail.secretEmoji||'🎯',n:scoreDetail.secret||'Secret',d:scoreDetail.secretDescription||'Objectif secret non enregistré.',pts:scoreDetail.secretPoints||0}} secret/>
            </div>
            {scoreDetail.publicObjectives?.length>0&&(
              <div style={{marginBottom:10}}>
                <div style={{fontSize:10,color:'#78350F',fontWeight:'bold',textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Objectifs publics</div>
                <div style={{display:'grid',gap:6}}>
                  {scoreDetail.publicObjectives.map(o=><InfoPill key={o.id||o.n} item={o}/>)}
                </div>
              </div>
            )}
            {scoreDetail.grid&&(
              <div style={{marginBottom:10}}>
                <div style={{fontSize:10,color:'#78350F',fontWeight:'bold',textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Plateau final</div>
                <div style={{display:'grid',gridTemplateColumns:`repeat(${G},1fr)`,gap:4,background:'rgba(120,53,15,.12)',padding:8,borderRadius:10}}>
                  {scoreDetail.grid.flatMap((row,r)=>row.map((tile,c)=>(
                    <div key={`${r}-${c}`} style={{aspectRatio:'1',borderRadius:6,background:tile?T[tile.type]?.bg:'rgba(255,255,255,.35)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'clamp(14px,5vw,22px)',position:'relative'}}>
                      {tile?T[tile.type]?.e:null}
                      {tile?.type==='touriste'&&(tile.windows||[]).map(d=><WBar key={d} d={d}/>)}
                    </div>

            <div style={{fontSize:10,color:'#78350F',fontWeight:'bold',textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Décompte</div>
            {scoreDetail.sections
              ?<div style={{display:'grid',gap:6}}>
                {[['Tuiles',scoreDetail.sections.tuiles],['Rôles',scoreDetail.sections.roles],['Objectifs publics',scoreDetail.sections.publics],['Secret',scoreDetail.sections.secret],['Cortados',scoreDetail.sections.cortados]].map(([title,items])=>items&&items.length?(

      </div>
    )}
    </>
  );
}

  function place(r,c){
    if(!sel)return;
    if(isTutorial&&tutorialCurrent&&(r!==tutorialCurrent.pos[0]||c!==tutorialCurrent.pos[1])){
      setMsg('Essayez la case surlignée.');
      return;
    }
    const tile=sel,ng=cp.grid.map(row=>[...row]);ng[r][c]=tile;
    const pts=iScore(tile,cp.grid,r,c,cp);
    const usedArchitect=cp.role?.id==='architecte'&&!cp.architectUsed&&!getVP(cp.grid).some(([pr,pc])=>pr===r&&pc===c);
    const np=players.map((p,i)=>i===ci?{...p,grid:ng,score:p.score+pts,architectUsed:p.architectUsed||usedArchitect}:p);
    const detail=iScoreDetail(tile,cp.grid,r,c,cp);
    setSel(null);setPendingPick(null);setVPos([]);setPreview(null);setLastScore(detail.pts>0?detail:null);
    setMsg(detail.pts>0?detail.text:'Tuile posée !');
    haptic(detail.pts>0?'heavy':'light');
    const placed=countT(ng);
    if(np.every(p=>countT(p.grid)===G*G)){setPlayers(np);finishGame(np);return;}
    if(placed===G*G){
      const ni=(ci+1)%np.length;
      setPlayers(np);setCi(ni);setTp('DRAFT');setSel(null);setPendingPick(null);setVPos([]);setPhase('TRANSITION');return;
    }
    setPlayers(np);setTp('POST');

      setTutorialStep(s=>Math.min((s??0)+1,TUTORIAL_STEPS.length));
      setMsg(tutorialCurrent?.done||'Bien joué.');
      setTimeout(()=>{setTp('DRAFT');setSel(null);setPendingPick(null);setVPos([]);setPreview(null);setLastScore(null);setActiveTab('vitrine');},50);
    }
    else if(tile.type==='habitue') setHabituePickerPending(true);
    else if(players.length===1){

      setTimeout(()=>{setTp('DRAFT');setSel(null);setPendingPick(null);setVPos([]);setPreview(null);setLastScore(null);},50);
    }
  }

  function applyHabitueFavori(type){
    if(!type){
      setHabituePickerPending(false);
      setMsg('Habitué posé, aucun client favorisé.');
      if(players.length===1){
        setTimeout(()=>{setTp('DRAFT');setSel(null);setPendingPick(null);setVPos([]);setPreview(null);setLastScore(null);},50);

        setTimeout(()=>endTurn(),50);

      return;
    }
    haptic('medium');
    // Build 2 extra tiles of chosen type and inject into bag
    let maxId=0;
    players.forEach(p=>p.grid.flat().forEach(t=>{if(t&&t.id>=maxId)maxId=t.id+1;}));
    bag.forEach(t=>{if(t.id>=maxId)maxId=t.id+1;});
    vitrine.forEach(t=>{if(t.id>=maxId)maxId=t.id+1;});
    const extra=[
      {id:maxId,type,...(type==='touriste'?{windows:rnd([...WIN_PAT])[0]}:{})},
      {id:maxId+1,type,...(type==='touriste'?{windows:rnd([...WIN_PAT])[0]}:{})},

    setBag(rnd([...bag,...extra]));
    setMsg(`☕ Habitué ! ${T[type].e} ${T[type].n} favorisé — 2 tuiles ajoutées au sac.`);

  }

  async function submitOnlineScore(){
    if(!onlinePayload)return;
    if(!ONLINE_SCORE_ENDPOINT){
      setOnlineSubmitStatus({type:'error',text:'Classement général non configuré : ajoutez l’URL Apps Script dans ONLINE_SCORE_ENDPOINT.'});
      return;
    }
    const sentKey='cafe-cortado-v22-online-sent';
    let sent=[];
    try{sent=JSON.parse(localStorage.getItem(sentKey)||'[]');}catch(e){sent=[];}
    const sentId=dailySentId(onlinePayload);
    if(sent.includes(sentId)){
      setOnlineSubmitStatus({type:'ok',text:'Cette partie a déjà été envoyée au classement général.'});
      return;
    }
    setOnlineSubmitStatus({type:'pending',text:'Envoi au classement général...'});
    try{
      const namedScores=onlinePayload.scores.map(score=>{
        const publicName=String(onlinePlayerNames[score.playerId]||score.player||'').trim();
        return {
          ...score,
          originalPlayer:score.originalPlayer||score.player,
          player:publicName||score.player,
        };
      });
      if(namedScores.some(score=>Number(score.score)===67&&score.player==='Ben')){
        setShowBen67(true);
        setTimeout(()=>setShowBen67(false),3200);
      }
      if(namedScores.length===1)saveOnlineName(namedScores[0].player);
      const payload={
        ...onlinePayload,
        displayName:namedScores.map(s=>s.player).join(', '),
        scores:namedScores,
      };
      await fetch(ONLINE_SCORE_ENDPOINT,{
        method:'POST',
        mode:'no-cors',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify(payload),
      });
      const next=[...sent,sentId].slice(-100);
      localStorage.setItem(sentKey,JSON.stringify(next));
      if(onlinePayload.category==='daily'){
        const state=loadDailyChallengeState();
        if(state?.date===onlinePayload.challengeDate){
          const nextDaily={...state,onlineSent:true,onlineSentAt:new Date().toISOString(),onlinePlayerNames};
          saveDailyChallengeState(nextDaily);setDailyChallengeState(nextDaily);
        }
      }
      setOnlineSubmitStatus({type:'ok',text:'Score envoyé au classement général.'});
    }catch(e){
      setOnlineSubmitStatus({type:'error',text:'Envoi impossible. Vérifiez votre connexion ou l’URL Apps Script.'});
    }
  }

            <div className="info-msg pop-in" style={{background:T[sel.type].bg,color:T[sel.type].fg,textAlign:'center',fontWeight:'bold',marginBottom:8}}>
              {T[sel.type].e} {T[sel.type].n} sélectionné — allez sur Café pour placer
            </div>
          )}
          <div className="vitrine-row">
            {vitrine.map(tile=>{
              const target=isTutorial&&tutorialCurrent&&tile.type===tutorialCurrent.type&&isDraft;
              return <VCard key={tile.id} tile={tile} disabled={!isDraft||(isTutorial&&!target)} highlight={target} onClick={()=>pickV(tile)} onInfo={setInfoTile}/>;
            })}
          </div>
          {isDraft&&(
            <button onClick={drawBag} disabled={!bag.length||isTutorial} className="btn-primary" style={{
              background:'#78350F',color:'#FEF3C7',marginTop:4,
              opacity:bag.length&&!isTutorial?1:.45,cursor:bag.length&&!isTutorial?'pointer':'not-allowed',
            }}>
              🎲 Piocher dans le sac ({bag.length} tuile{bag.length!==1?'s':''})
            </button>
          )}
        </>
      )}

      {/* Objectives mini display */}
      <div style={{marginTop:16}}>
        <div style={{fontSize:11,color:'#78350F',fontWeight:'bold',textTransform:'uppercase',letterSpacing:1,marginBottom:7}}>Objectifs publics</div>
        <div style={{display:'grid',gap:5}}>
          {publicObjectives.map(o=><InfoPill key={o.id} item={o}/>)}
        </div>
        <div style={{fontSize:11,color:'#78350F',fontWeight:'bold',textTransform:'uppercase',letterSpacing:1,marginTop:10,marginBottom:7}}>Objectif secret</div>
        <InfoPill item={cp.secret} secret/>
      </div>
    </div>
  );

  const tabInfo = ()=>(
    <div style={{padding:'8px 14px 12px'}}>
      {/* Role card */}
      <div style={{background:'rgba(120,53,15,.1)',border:'1px solid rgba(120,53,15,.2)',borderRadius:12,padding:14,marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:'bold',color:'#78350F',marginBottom:4}}>
          {cp.role.e} {cp.role.n}
        </div>
        <div style={{fontSize:12,color:'#92400E',lineHeight:1.45}}>{cp.role.d}</div>
      </div>

      {/* All players */}
      <div style={{fontSize:11,color:'#78350F',fontWeight:'bold',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>Scores</div>
      <div style={{display:'grid',gap:6,marginBottom:14}}>
        {players.map(p=>(
          <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:p.id===ci?'rgba(120,53,15,.12)':'rgba(120,53,15,.05)',border:`1px solid ${p.id===ci?'rgba(120,53,15,.25)':'rgba(120,53,15,.1)'}`,borderRadius:10,padding:'9px 12px'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:20}}>{p.emoji}</span>
              <div>
                <div style={{fontSize:13,fontWeight:p.id===ci?'bold':'normal',color:p.color}}>{p.name}</div>
                <div style={{fontSize:10,color:'#92400E',opacity:.7}}>{p.role.e} {p.role.n}</div>
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:20,fontWeight:'bold',color:p.id===ci?'#78350F':'#92400E'}}>{p.score}</div>
              <div style={{fontSize:10,color:'#92400E',opacity:.7}}>☕×{p.cortado}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Grids summary */}
      <div style={{fontSize:11,color:'#78350F',fontWeight:'bold',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>Progression des cafés</div>
      <div style={{display:'grid',gridTemplateColumns:players.length===2?'1fr 1fr':players.length===3?'1fr 1fr 1fr':'1fr 1fr',gap:8}}>
        {players.map(p=>(
          <div key={p.id} style={{background:'rgba(120,53,15,.06)',borderRadius:10,padding:8}}>
            <div style={{fontSize:10,fontWeight:'bold',color:p.color,marginBottom:5,textAlign:'center'}}>{p.emoji} {countT(p.grid)}/{G*G}</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:2,background:'rgba(120,53,15,.15)',padding:3,borderRadius:6}}>
              {Array.from({length:G},(_,r)=>Array.from({length:G},(_,c)=>{
                const tile=p.grid[r][c];
                return<div key={`${r}-${c}`} style={{aspectRatio:'1',borderRadius:3,background:tile?T[tile.type].bg:'rgba(255,255,255,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'clamp(6px,2vw,10px)'}}>
                  {tile?T[tile.type].e:null}
                </div>;
              })).flat()}
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:'#F5EDD8'}}>
      <RulesSheet open={showRules} onClose={()=>setShowRules(false)} leaderboard={leaderboard} onClear={()=>{setLeaderboard([]);saveBestScores([]);}}/>
      <ConfirmQuitSheet open={showQuitConfirm} onCancel={()=>setShowQuitConfirm(false)} onConfirm={quitGame}/>
      <TileInfoSheet tile={infoTile} onClose={()=>setInfoTile(null)}/>
      <HabituePickerSheet open={habituePickerPending} onChoose={applyHabitueFavori} onSkip={()=>applyHabitueFavori(null)}/>
      {isTutorial&&(
        <div className="tutorial-callout pop-in">
          <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:1.2,opacity:.62,marginBottom:5}}>
            {tutorialDone?'Tutoriel terminé':tutorialIntro?`Avant de jouer ${tutorialIntroIndex+1}/3`:`Placement ${Math.min((tutorialStep??0)+1,TUTORIAL_STEPS.length)}/${TUTORIAL_STEPS.length}`}
          </div>
          <div style={{fontSize:14,lineHeight:1.35,fontWeight:'bold'}}>
            {tutorialText}
          </div>
          {tutorialIntro&&tutorialIntroIndex===0&&cp?.role?.d&&(
            <div style={{fontSize:12,lineHeight:1.35,opacity:.72,marginTop:6}}>{cp.role.d}</div>
          )}
          {tutorialIntro&&tutorialIntroIndex===1&&cp?.secret?.d&&(
            <div style={{fontSize:12,lineHeight:1.35,opacity:.72,marginTop:6}}>{cp.secret.d}</div>
          )}
          {tutorialIntro&&tutorialIntroIndex===2&&(
            <div style={{display:'grid',gap:4,marginTop:8}}>
              {publicObjectives.map(o=>(
                <div key={o.id} style={{fontSize:12,lineHeight:1.25,opacity:.78}}>
                  {o.e} <strong>{o.n}</strong> — {o.d}
                </div>
              ))}
            </div>
          )}
          {!tutorialDone&&!tutorialIntro&&(
            <div style={{fontSize:12,lineHeight:1.35,opacity:.72,marginTop:6}}>
              {isPlace?'Les cases vertes sont les emplacements autorisés.':'La vitrine propose 3 tuiles visibles ; après un choix, elle se remplit automatiquement.'}
            </div>
          )}
          {tutorialIntro&&(
            <button onClick={advanceTutorialIntro} style={{marginTop:10,width:'100%',padding:'10px 12px',border:'none',borderRadius:9,background:'#F59E0B',color:'#1C0A00',fontWeight:'bold',fontFamily:'Georgia,serif'}}>
              {tutorialIntroIndex===2?'Commencer les placements':'Suivant'}
            </button>
          )}
          {tutorialDone&&(
            <button onClick={finishTutorial} style={{marginTop:10,width:'100%',padding:'10px 12px',border:'none',borderRadius:9,background:'#F59E0B',color:'#1C0A00',fontWeight:'bold',fontFamily:'Georgia,serif'}}>
              Retour à l’accueil
            </button>
          )}
        </div>
      )}

      {/* Header */}
      <div className="game-header" style={{background:cp.color}}>
        <div>
          <div style={{color:'white',fontSize:15,fontWeight:'bold',letterSpacing:.3}}>
            {cp.emoji} {cp.name}
          </div>
          <div style={{color:'rgba(255,255,255,.65)',fontSize:10,marginTop:2}}>
            {isDraft?'→ Choisissez une tuile':isPlace?'→ Placez sur votre café':'→ Terminez ou pivotez un Touriste'}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{textAlign:'right'}}>
            <div style={{color:'white',fontSize:24,fontWeight:'bold'}}>{cp.score}<span style={{fontSize:11,fontWeight:'normal',marginLeft:2}}>pts</span></div>
            <div style={{color:'rgba(255,255,255,.65)',fontSize:11}}>☕×{cp.cortado}</div>
          </div>
        </div>
      </div>

      {/* Player strip — masqué en solo */}
      {players.length>1&&(
      <div style={{flexShrink:0,display:'flex',justifyContent:'space-around',padding:'7px 16px',background:'rgba(120,53,15,.08)',borderBottom:'1px solid rgba(120,53,15,.12)'}}>
        {players.map(p=>(
          <div key={p.id} className="player-dot" style={{opacity:p.id===ci?1:.4,background:p.id===ci?'rgba(120,53,15,.1)':'transparent'}}>
            <span style={{fontSize:18}}>{p.emoji}</span>
            <span style={{fontSize:12,fontWeight:p.id===ci?'bold':'normal',color:p.color}}>{p.score}</span>
          </div>
        ))}
      </div>
      )}

      {/* Tab content */}
      <div className="game-body">
        {activeTab==='cafe'?tabCafe():activeTab==='vitrine'?tabVitrine():tabInfo()}
      </div>

      {/* End turn bar (only in POST, and only multiplayer) */}
      {isPost&&players.length>1&&(
        <div className="end-turn-bar">
          <button onClick={endTurn} className="btn-primary" style={{background:cp.color,color:'white'}}>
            Fin de mon tour →
          </button>
        </div>
      )}

      {/* Bottom navigation */}
      <nav className="bottom-nav">
        <button className={activeTab==='vitrine'?'active':''} onClick={()=>{haptic('light');setActiveTab('vitrine');}}>
          <span className="nav-icon">🪟</span>
          Vitrine{bag.length>0?` (${bag.length})`:''}
        </button>
        <button className={activeTab==='cafe'?'active':''} onClick={()=>{haptic('light');setActiveTab('cafe');}}>
          <span className="nav-icon">🏪</span>
          Café
          {(isPlace||isPost)&&<span style={{position:'absolute',top:4,right:10,background:'#F59E0B',borderRadius:'50%',width:8,height:8}}/>}
        </button>
        <button className={activeTab==='info'?'active':''} onClick={()=>{haptic('light');setActiveTab('info');}}>
          <span className="nav-icon">👥</span>
          Joueurs
        </button>
        <button onClick={()=>{haptic('light');setShowRules(true);}}>
          <span className="nav-icon">📜</span>
          Règles
        </button>
        <button onClick={()=>{haptic('light');setShowQuitConfirm(true);}}>
          <span className="nav-icon">✕</span>
          Quitter
        </button>
      </nav>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<CafeCortado />);
</script>
</body>
</html>
